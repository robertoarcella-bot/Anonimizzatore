name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Build Electron app
        run: npx electron-vite build
      - name: Verify build output
        run: |
          echo "=== out/ contents ==="
          dir out /s /b
          echo "=== package.json main ==="
          node -e "console.log(require('./package.json').main)"
      - name: Package Windows installer
        run: npx electron-builder --win -c.win.signAndEditExecutable=false
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-installer
          path: dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Build Electron app
        run: npx electron-vite build
      - name: Verify build output
        run: |
          echo "=== out/ contents ==="
          find out -type f
          echo "=== package.json main ==="
          node -e "console.log(require('./package.json').main)"
      - name: Package macOS installer
        run: npx electron-builder --mac -c.mac.identity=null
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-installer
          path: dist/*.dmg
